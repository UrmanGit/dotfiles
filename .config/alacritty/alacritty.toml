[general]
import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
dynamic_padding = true
decorations = "None"
opacity = 1.0
blur = false
dynamic_title = false

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 12.0

[font.offset]
x = 0
y = -2 

[cursor]
style = { shape = "Underline", blinking = "On" }

[terminal]
shell = "/usr/bin/zsh"

[mouse]
hide_when_typing = true
